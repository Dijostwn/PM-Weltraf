<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proses Fabrikasi</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f4; }
        .table-container { border: 1px solid #000; display: flex; flex-direction: column; width: 100%; max-width: 1200px; background: white; }
        .header-row { border-bottom: 1px solid #000; background-color: #e0e0e0; text-align: center; padding: 10px; font-weight: bold; }
        .content-row { display: flex; text-align: center; font-size: 14px; font-weight: bold; min-height: 100px; }
        .column { border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; padding: 10px; flex: 1; }
        .column:last-child { border-right: none; }
        .grey-bg { background-color: #e0e0e0; }
        
        /* Tombol Simulasi untuk ke halaman Success */
        .submit-btn { margin-top: 20px; padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .submit-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="table-container">
            <div class="header-row">Proses Fabrikasi</div>
            <div class="content-row">
                <div class="column grey-bg">Tank Making</div>
                <div class="column grey-bg">Core Making (Fixing + Core Stacking)</div>
                <div class="column grey-bg">Coil Making (Winding HV and LV)</div>
                <div class="column grey-bg">Core and Coil Assembly</div>
                <div class="column grey-bg">Connection</div>
                <div class="column grey-bg">Final Assembly</div>
                <div class="column grey-bg">Internal Test</div>
                <div class="column grey-bg">Finishing</div>
                <div class="column grey-bg">Factory Acceptance Test (FAT)</div>
                <div class="column grey-bg">Closing Punchlist (If Any)</div>
                <div class="column grey-bg">Packing and Delivery</div>
            </div>
        </div>

        <button class="submit-btn" onclick="location.href='success.html'">Submit Project</button>
    </div>

</body>
</html>
